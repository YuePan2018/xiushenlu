<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>工作树编辑器 - 修身炉</title>
  <link rel="stylesheet" href="/static/vendor/simple-mind-map-0.14.0-fix.2/simpleMindMap.esm.min.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #eef3f8;
      --text: #1f2937;
      --muted: #607086;
      --line: #d7e0ea;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --danger: #b42318;
      --ok: #20735b;
      --shadow: 0 16px 38px rgba(31, 41, 55, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .bar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      max-width: 1680px;
      margin: 0 auto;
      padding: 14px 18px;
    }
    h1, h2 {
      margin: 0;
      letter-spacing: 0;
    }
    h1 {
      font-size: 20px;
      line-height: 1.25;
    }
    h2 {
      font-size: 15px;
      line-height: 1.35;
    }
    .meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    button, select, input {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
      min-height: 38px;
    }
    button {
      cursor: pointer;
      padding: 8px 13px;
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 650;
    }
    button.secondary {
      background: #fff;
      border-color: var(--line);
      color: var(--text);
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }
    select, input {
      width: 100%;
      padding: 8px 10px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    main {
      display: grid;
      grid-template-columns: minmax(280px, 340px) minmax(520px, 1fr);
      gap: 14px;
      max-width: 1680px;
      margin: 0 auto;
      padding: 14px;
      min-height: calc(100vh - 70px);
    }
    .side {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .status {
      color: var(--muted);
      font-size: 13px;
      min-height: 18px;
    }
    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }
    .canvas-panel {
      position: relative;
      min-height: 680px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20px 20px, rgba(255, 255, 255, 0.72) 0 1px, transparent 1.5px),
        linear-gradient(135deg, #071224, #0d1b34 55%, #152947);
      background-size: 24px 24px, cover;
      box-shadow: var(--shadow);
    }
    #mindMap {
      width: 100%;
      height: calc(100vh - 102px);
      min-height: 680px;
    }
    #mindMap .smm-richtext-node-wrap {
      display: block;
      margin: 0;
      padding: 0;
      line-height: 1.2;
      white-space: pre-wrap;
      overflow: visible;
    }
    #mindMap .smm-richtext-node-wrap p {
      margin: 0;
      padding: 0;
      line-height: 1.2;
    }
    #mindMap foreignObject {
      overflow: visible;
    }
    .node-preview {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-2);
      padding: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }
    @media (max-width: 980px) {
      main {
        grid-template-columns: 1fr;
      }
      #mindMap,
      .canvas-panel {
        min-height: 620px;
      }
    }
    @media (max-width: 640px) {
      .bar {
        align-items: flex-start;
        flex-direction: column;
      }
      main {
        padding: 10px;
      }
      button {
        width: 100%;
      }
    }
  </style>
  <script>
    window.externalPublicPath = "/static/vendor/simple-mind-map-0.14.0-fix.2/";
  </script>
  <script src="/static/vendor/simple-mind-map-0.14.0-fix.2/simpleMindMap.umd.min.js"></script>
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <h1>工作树编辑器</h1>
        <div class="meta">根在上，叶在下</div>
      </div>
      <div class="row">
        <a href="/"><button class="secondary" type="button">返回控制台</button></a>
        <a href="/task-tree"><button class="secondary" type="button">JSON 树</button></a>
      </div>
    </div>
  </header>
  <main>
    <aside class="side">
      <section class="panel stack">
        <h2>文件</h2>
        <div>
          <label for="treeTitleInput">保存标题</label>
          <input id="treeTitleInput" type="text" spellcheck="false" placeholder="标题会作为 JSON 文件名">
        </div>
        <div>
          <label for="treeSelect">已保存</label>
          <select id="treeSelect"></select>
        </div>
        <div class="row">
          <button id="saveBtn" type="button">保存</button>
          <button class="secondary" id="reloadBtn" type="button">重新读取</button>
        </div>
        <div class="status" id="statusText">准备中</div>
        <div class="meta" id="pathText"></div>
      </section>
      <section class="panel stack">
        <h2>视图</h2>
        <div class="row">
          <button class="secondary" id="fitBtn" type="button">居中</button>
          <button class="secondary" id="expandBtn" type="button">全部展开</button>
          <button class="secondary" id="collapseBtn" type="button">全部收起</button>
        </div>
      </section>
      <section class="panel stack">
        <h2>当前节点</h2>
        <div class="node-preview" id="nodePreview">未选择节点。</div>
      </section>
    </aside>
    <section class="canvas-panel">
      <div id="mindMap"></div>
    </section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    const allowedKinds = new Set(["phase", "milestone", "task", "habit", "checkpoint"]);
    const allowedCadences = new Set(["none", "daily", "weekly", "monthly", "phase", "one_off"]);
    const allowedStatuses = new Set(["todo", "doing", "done", "paused"]);
    const state = {
      busy: false,
      sample: "",
      selectedTitle: "",
      mindMap: null,
    };

    function getMindMapCtor() {
      const exported = window.simpleMindMap;
      if (!exported) {
        throw new Error("SimpleMindMap 资源未加载。");
      }
      return exported.default || exported;
    }

    function setBusy(value) {
      state.busy = value;
      for (const button of document.querySelectorAll("button")) {
        button.disabled = value;
      }
      $("treeSelect").disabled = value || $("treeSelect").options.length === 0;
    }

    function setStatus(text, kind = "") {
      const el = $("statusText");
      el.textContent = text || "";
      el.className = kind ? `status ${kind}` : "status";
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      const body = await response.json().catch(() => ({ detail: response.statusText }));
      if (!response.ok) {
        throw new Error(body.detail || response.statusText);
      }
      return body;
    }

    async function loadState(title = "") {
      setBusy(true);
      try {
        const query = title ? `?title=${encodeURIComponent(title)}` : "";
        const data = await requestJson(`/api/task-tree${query}`);
        renderState(data);
        setStatus(data.selected ? `已读取 ${data.selected.filename}` : "已载入示例。", "ok");
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        setBusy(false);
      }
    }

    function renderState(data) {
      state.sample = data.sample || "";
      const items = data.items || [];
      $("treeSelect").innerHTML = items.length
        ? items.map((item) => `<option value="${escapeHtml(item.title)}">${escapeHtml(item.filename)}</option>`).join("")
        : '<option value="">暂无</option>';
      $("treeSelect").disabled = items.length === 0;

      if (data.selected) {
        state.selectedTitle = data.selected.title;
        $("treeTitleInput").value = data.selected.title;
        $("pathText").textContent = data.selected.path;
        $("treeSelect").value = data.selected.title;
        loadMindMap(data.selected.tree);
        return;
      }

      const sample = parseTreeText(state.sample);
      state.selectedTitle = "";
      $("treeTitleInput").value = sample.title || "";
      $("pathText").textContent = data.directory || "";
      loadMindMap(sample);
    }

    function parseTreeText(text) {
      const stripped = String(text || "").trim();
      const match = stripped.match(/^```(?:json)?\s*([\s\S]*?)\s*```$/i);
      const source = match ? match[1].trim() : stripped;
      if (!source) {
        throw new Error("任务树 JSON 不能为空。");
      }
      return JSON.parse(source);
    }

    function loadMindMap(tree) {
      const MindMap = getMindMapCtor();
      const root = taskTreeToMindRoot(tree);
      if (state.mindMap) {
        state.mindMap.destroy();
        state.mindMap = null;
      }
      state.mindMap = new MindMap({
        el: $("mindMap"),
        data: root,
        layout: "organizationStructure",
        theme: "default",
        fit: true,
        fitPadding: 70,
        textAutoWrapWidth: 220,
        mousewheelAction: "zoom",
        minZoomRatio: 35,
        maxZoomRatio: 240,
        alwaysShowExpandBtn: true,
        isShowExpandNum: true,
        expandBtnSize: 18,
        enableShortcutOnlyWhenMouseInSvg: true,
        enableAutoEnterTextEditWhenKeydown: true,
        enableDragModifyNodeWidth: true,
        errorHandler: (_code, error) => setStatus(error.message || String(error), "error"),
        themeConfig: {
          backgroundColor: "transparent",
          backgroundImage: "none",
          lineColor: "#95a5bd",
          lineWidth: 1.5,
          lineStyle: "straight",
          root: {
            shape: "rectangle",
            fillColor: "#f8fbff",
            color: "#111827",
            borderColor: "#2563eb",
            borderWidth: 1.5,
            borderRadius: 6,
            fontSize: 20,
            fontWeight: "bold",
            paddingX: 24,
            paddingY: 14,
            marginY: 78,
            marginX: 86,
          },
          second: {
            shape: "rectangle",
            fillColor: "#ffffff",
            color: "#1f2937",
            borderColor: "#60a5fa",
            borderWidth: 1.2,
            borderRadius: 6,
            fontSize: 16,
            paddingX: 18,
            paddingY: 12,
            marginY: 62,
            marginX: 58,
          },
          node: {
            shape: "rectangle",
            fillColor: "#ffffff",
            color: "#243047",
            borderColor: "#93b4d7",
            borderWidth: 1,
            borderRadius: 6,
            fontSize: 15,
            paddingX: 14,
            paddingY: 10,
            marginY: 42,
            marginX: 34,
          },
        },
      });
      state.mindMap.on("node_active", (node) => {
        updateNodePreview(node && node.nodeData ? node.nodeData : null);
      });
      window.setTimeout(fitMap, 120);
    }

    function taskTreeToMindRoot(tree) {
      return {
        data: {
          uid: "root",
          text: tree.title || "未命名任务树",
          note: tree.summary || "",
          expand: true,
          _xiushenlu: {
            root: true,
            version: Number(tree.version || 1),
          },
        },
        children: (Array.isArray(tree.nodes) ? tree.nodes : []).map((node, index) =>
          taskNodeToMindNode(node, `nodes-${index}`)
        ),
      };
    }

    function taskNodeToMindNode(node, fallbackId) {
      const children = Array.isArray(node.children) ? node.children : [];
      return {
        data: {
          uid: node.id || fallbackId,
          text: node.title || "未命名节点",
          note: node.note || "",
          tag: Array.isArray(node.tags) ? node.tags : [],
          expand: true,
          _xiushenlu: {
            kind: normalizeEnum(node.kind, allowedKinds, "task"),
            cadence: normalizeEnum(node.cadence, allowedCadences, "none"),
            status: normalizeEnum(node.status, allowedStatuses, "todo"),
          },
        },
        children: children.map((child, index) => taskNodeToMindNode(child, `${fallbackId}-${index}`)),
      };
    }

    function mindRootToTaskTree(root) {
      const data = root && root.data ? root.data : {};
      const meta = data._xiushenlu || {};
      const title = normalizeText(data.text, "未命名任务树");
      return {
        version: Number(meta.version || 1),
        title,
        summary: normalizeText(data.note || "", ""),
        nodes: (Array.isArray(root.children) ? root.children : []).map((node, index) =>
          mindNodeToTaskNode(node, `nodes-${index}`)
        ),
      };
    }

    function mindNodeToTaskNode(node, fallbackId) {
      const data = node && node.data ? node.data : {};
      const meta = data._xiushenlu || {};
      const children = Array.isArray(node.children) ? node.children : [];
      return {
        id: safeNodeId(data.uid || fallbackId, fallbackId),
        title: normalizeText(data.text, "未命名节点"),
        kind: normalizeEnum(meta.kind, allowedKinds, "task"),
        cadence: normalizeEnum(meta.cadence, allowedCadences, "none"),
        status: normalizeEnum(meta.status, allowedStatuses, "todo"),
        note: normalizeText(data.note || "", ""),
        tags: Array.isArray(data.tag) ? data.tag.map((tag) => String(tag).trim()).filter(Boolean) : [],
        children: children.map((child, index) => mindNodeToTaskNode(child, `${fallbackId}-${index}`)),
      };
    }

    function normalizeEnum(value, allowed, fallback) {
      const text = String(value || "").trim();
      return allowed.has(text) ? text : fallback;
    }

    function normalizeText(value, fallback) {
      const text = String(value || "").trim();
      return text || fallback;
    }

    function safeNodeId(value, fallback) {
      const text = String(value || fallback || "").trim();
      const normalized = text.replace(/[^\w-]+/g, "-").replace(/^-+|-+$/g, "");
      return normalized || fallback || "node";
    }

    async function saveTree() {
      if (!state.mindMap) {
        return;
      }
      setBusy(true);
      setStatus("保存中...");
      try {
        const tree = mindRootToTaskTree(state.mindMap.getData(false));
        const data = await requestJson("/api/task-tree", {
          method: "POST",
          body: JSON.stringify({
            title: $("treeTitleInput").value || tree.title,
            text: JSON.stringify(tree, null, 2),
          }),
        });
        renderState(data.state);
        setStatus(data.message || "任务树已保存。", "ok");
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        setBusy(false);
      }
    }

    function fitMap() {
      if (state.mindMap && state.mindMap.view && state.mindMap.view.fit) {
        state.mindMap.view.fit();
      }
    }

    function expandAll() {
      if (state.mindMap) {
        state.mindMap.execCommand("EXPAND_ALL");
        fitMap();
      }
    }

    function collapseAll() {
      if (state.mindMap) {
        state.mindMap.execCommand("UNEXPAND_ALL");
        fitMap();
      }
    }

    function updateNodePreview(nodeData) {
      if (!nodeData || !nodeData.data) {
        $("nodePreview").textContent = "未选择节点。";
        return;
      }
      const data = nodeData.data;
      const meta = data._xiushenlu || {};
      const lines = [
        normalizeText(data.text, "未命名节点"),
        meta.root ? "根节点" : `类型：${meta.kind || "task"}`,
      ];
      if (!meta.root) {
        lines.push(`状态：${meta.status || "todo"}`);
        lines.push(`周期：${meta.cadence || "none"}`);
      }
      if (data.note) {
        lines.push(`备注：${data.note}`);
      }
      $("nodePreview").textContent = lines.join("\n");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    $("treeSelect").addEventListener("change", () => loadState($("treeSelect").value));
    $("saveBtn").addEventListener("click", saveTree);
    $("reloadBtn").addEventListener("click", () => loadState($("treeTitleInput").value || state.selectedTitle));
    $("fitBtn").addEventListener("click", fitMap);
    $("expandBtn").addEventListener("click", expandAll);
    $("collapseBtn").addEventListener("click", collapseAll);
    window.addEventListener("resize", () => {
      if (state.mindMap) {
        state.mindMap.resize();
      }
    });
    loadState();
  </script>
</body>
</html>

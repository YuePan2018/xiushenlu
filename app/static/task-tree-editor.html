<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>工作树 - 修身炉</title>
  <link rel="stylesheet" href="/static/vendor/simple-mind-map-0.14.0-fix.2/simpleMindMap.esm.min.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6f4;
      --surface: #ffffff;
      --surface-soft: #f7faf8;
      --surface-tint: #eef6f1;
      --text: #17212f;
      --muted: #667085;
      --line: #d7e0dc;
      --accent: #28745b;
      --accent-dark: #1f5d49;
      --accent-blue: #2f6fd6;
      --accent-warm: #b86e2f;
      --danger: #b42318;
      --ok: #20735b;
      --shadow: 0 18px 44px rgba(23, 33, 47, 0.09);
      --focus: 0 0 0 3px rgba(40, 116, 91, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
      -webkit-tap-highlight-color: rgba(40, 116, 91, 0.14);
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(243, 246, 244, 0.92)),
        var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: 0;
      touch-action: manipulation;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(215, 224, 220, 0.88);
      background: rgba(248, 251, 249, 0.9);
      backdrop-filter: blur(14px);
    }

    .bar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      max-width: 1760px;
      margin: 0 auto;
      padding: 14px max(18px, env(safe-area-inset-right)) 14px max(18px, env(safe-area-inset-left));
    }

    h1,
    h2,
    p {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      color: #14243a;
      font-size: 21px;
      font-weight: 760;
      line-height: 1.25;
      text-wrap: balance;
    }

    h2,
    .summary-title {
      font-size: 15px;
      font-weight: 720;
      line-height: 1.35;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .button-link,
    button,
    select,
    input,
    textarea {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font: inherit;
    }

    .button-link,
    button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 38px;
      padding: 8px 13px;
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 680;
      white-space: nowrap;
    }

    .button-link.secondary,
    button.secondary {
      border-color: var(--line);
      background: var(--surface);
      color: var(--text);
    }

    .button-link:hover,
    button:hover {
      border-color: var(--accent-dark);
      background: var(--accent-dark);
      color: #fff;
    }

    .button-link.secondary:hover,
    button.secondary:hover,
    .tool-button:hover,
    .mode-button:hover,
    .icon-button:hover,
    .collapse-button:hover {
      border-color: #bfd0c7;
      background: var(--surface-tint);
      color: var(--text);
    }

    .button-link:focus-visible,
    button:focus-visible,
    summary:focus-visible,
    select:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 0;
      box-shadow: var(--focus);
    }

    button:disabled,
    input:disabled,
    select:disabled,
    textarea:disabled {
      cursor: not-allowed;
      opacity: 0.56;
    }

    .header-actions {
      flex: 0 0 auto;
      justify-content: flex-end;
    }

    .menu-wrap {
      position: relative;
    }

    .menu-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      min-width: 38px;
      height: 38px;
      border-color: var(--line);
      background: var(--surface);
      color: var(--text);
      padding: 0;
    }

    .menu-button:hover {
      border-color: #bfd0c7;
      background: var(--surface-tint);
      color: var(--text);
    }

    .menu-icon {
      display: grid;
      gap: 4px;
      width: 16px;
    }

    .menu-icon span {
      display: block;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
    }

    .menu-list {
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      z-index: 30;
      min-width: 168px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 6px;
    }

    .menu-list a {
      display: block;
      border-radius: 6px;
      color: var(--text);
      padding: 8px 10px;
      white-space: nowrap;
    }

    .menu-list a:hover {
      background: var(--surface-tint);
    }

    select,
    input,
    textarea {
      width: 100%;
      padding: 9px 10px;
      background: #fff;
    }

    textarea {
      resize: vertical;
      font-family: "Cascadia Mono", Consolas, "Microsoft YaHei UI", monospace;
      font-size: 13px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    main {
      display: grid;
      grid-template-columns: minmax(300px, 360px) minmax(520px, 1fr) minmax(300px, 360px);
      gap: 12px;
      width: 100%;
      max-width: 1760px;
      min-height: calc(100vh - 70px);
      margin: 0 auto;
      padding: 12px max(12px, env(safe-area-inset-right)) 18px max(12px, env(safe-area-inset-left));
      transition: grid-template-columns 160ms ease;
    }

    main.left-collapsed {
      grid-template-columns: 44px minmax(520px, 1fr) minmax(300px, 360px);
    }

    main.right-collapsed {
      grid-template-columns: minmax(300px, 360px) minmax(520px, 1fr) 44px;
    }

    main.left-collapsed.right-collapsed {
      grid-template-columns: 44px minmax(520px, 1fr) 44px;
    }

    .side {
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
    }

    .side-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      min-height: 52px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
    }

    .side-title {
      min-width: 0;
    }

    .side-title .meta {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .side-body {
      display: flex;
      flex-direction: column;
      gap: 13px;
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 14px;
    }

    .side-rail {
      display: none;
      height: 100%;
      align-items: center;
      justify-content: center;
      padding: 10px 0;
      writing-mode: vertical-rl;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }

    .left-collapsed .left-side .side-body,
    .left-collapsed .left-side .side-header,
    .right-collapsed .right-side .side-body,
    .right-collapsed .right-side .side-header {
      display: none;
    }

    .left-collapsed .left-side .side-rail,
    .right-collapsed .right-side .side-rail {
      display: flex;
    }

    .collapse-button,
    .tool-button,
    .mode-button {
      width: 34px;
      min-width: 34px;
      height: 34px;
      min-height: 34px;
      padding: 0;
      border-color: var(--line);
      background: var(--surface);
      color: var(--text);
      font-size: 16px;
      line-height: 1;
    }

    .mode-button {
      width: auto;
      min-width: 74px;
      padding: 0 11px;
      font-size: 13px;
      font-weight: 760;
    }

    .mode-button[aria-pressed="true"] {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .task-source-block,
    .task-edit-block {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .source-divider {
      height: 3px;
      border-radius: 999px;
      background: var(--line);
    }

    .source-actions {
      position: sticky;
      bottom: 0;
      display: flex;
      margin: auto -14px -14px;
      padding: 12px 14px 14px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
    }

    .source-actions button {
      width: 100%;
    }

    .field-label-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
    }

    .field-label-row label {
      margin-bottom: 0;
    }

    .file-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .icon-button {
      width: 30px;
      min-width: 30px;
      height: 30px;
      min-height: 30px;
      padding: 0;
      border-color: var(--line);
      background: var(--surface);
      color: var(--text);
    }

    .icon-button svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
    }

    .danger-icon-button {
      border-color: rgba(180, 35, 24, 0.28);
      background: #fff7f5;
      color: var(--danger);
    }

    .danger-icon-button:hover {
      border-color: rgba(180, 35, 24, 0.42);
      background: #ffe7e2;
      color: var(--danger);
    }

    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--danger);
    }

    details.input-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      overflow: hidden;
    }

    .input-panel summary {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      min-height: 44px;
      padding: 11px 12px;
      cursor: pointer;
      list-style: none;
    }

    .input-panel summary::-webkit-details-marker {
      display: none;
    }

    .summary-copy {
      min-width: 0;
    }

    .summary-title {
      display: block;
      color: var(--text);
    }

    .summary-subtitle {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chevron {
      width: 10px;
      height: 10px;
      flex: 0 0 auto;
      border-right: 2px solid var(--muted);
      border-bottom: 2px solid var(--muted);
      transform: rotate(45deg);
      transform-origin: center;
    }

    .input-panel[open] .chevron {
      transform: rotate(225deg);
    }

    .input-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0 12px 12px;
      border-top: 1px solid var(--line);
    }

    #treeJsonInput {
      min-height: 230px;
      white-space: pre;
    }

    .content-panel {
      min-height: 0;
    }

    .selected-node-title {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      padding: 9px 10px;
      color: var(--text);
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    input.selected-node-title {
      background: #fff;
    }

    .content-panel input[readonly],
    .content-panel textarea[readonly] {
      cursor: text;
      background: var(--surface-soft);
      color: var(--text);
    }

    .node-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .node-actions button {
      flex: 1 1 0;
    }

    button.danger-button {
      border-color: rgba(180, 35, 24, 0.3);
      background: #fff7f5;
      color: var(--danger);
    }

    button.danger-button:hover {
      border-color: rgba(180, 35, 24, 0.42);
      background: #ffe7e2;
      color: var(--danger);
    }

    #nodeContentInput {
      min-height: 300px;
    }

    .canvas-panel {
      position: relative;
      min-width: 0;
      min-height: 690px;
      overflow: hidden;
      border: 1px solid #cfdcd5;
      border-radius: 8px;
      background:
        linear-gradient(rgba(39, 116, 91, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(47, 111, 214, 0.07) 1px, transparent 1px),
        linear-gradient(135deg, #f8fbff 0%, #f4f8f2 48%, #fff8ee 100%);
      background-size: 28px 28px, 28px 28px, cover;
      box-shadow: var(--shadow);
    }

    .canvas-label {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
      border: 1px solid rgba(215, 224, 220, 0.88);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      font-size: 12px;
      padding: 5px 9px;
      pointer-events: none;
    }

    .canvas-tools {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 3;
      display: inline-flex;
      gap: 6px;
      align-items: center;
      border: 1px solid rgba(215, 224, 220, 0.92);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 10px 26px rgba(23, 33, 47, 0.08);
      padding: 5px;
    }

    #mindMap {
      width: 100%;
      min-width: 0;
      height: calc(100vh - 94px);
      min-height: 690px;
    }

    #mindMap .smm-richtext-node-wrap {
      display: block;
      margin: 0;
      padding: 0;
      line-height: 1.2;
      white-space: pre-wrap;
      overflow: visible;
    }

    #mindMap .smm-richtext-node-wrap p {
      margin: 0;
      padding: 0;
      line-height: 1.2;
    }

    #mindMap foreignObject {
      overflow: visible;
    }

    .node-preview {
      position: fixed;
      z-index: 40;
      max-width: min(360px, calc(100vw - 24px));
      max-height: min(320px, calc(100vh - 24px));
      overflow: hidden;
      padding: 12px 13px;
      border: 1px solid rgba(40, 116, 91, 0.22);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 0 18px 44px rgba(23, 33, 47, 0.14);
      color: var(--text);
      pointer-events: none;
    }

    .node-preview[hidden] {
      display: none;
    }

    .node-preview-content {
      display: -webkit-box;
      color: #344054;
      font-size: 13px;
      line-height: 1.55;
      overflow: hidden;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 8;
    }

    .node-action-layer {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
    }

    .node-action-button {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      min-width: 18px;
      height: 18px;
      min-height: 18px;
      padding: 0;
      border: 1px solid rgba(40, 116, 91, 0.24);
      border-radius: 999px;
      background: #fff;
      color: var(--accent);
      box-shadow: 0 5px 12px rgba(23, 33, 47, 0.12);
      cursor: pointer;
      font-size: 13px;
      font-weight: 760;
      line-height: 1;
      pointer-events: auto;
      user-select: none;
    }

    .node-action-button:hover {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .node-action-button.sibling {
      top: 50%;
      right: 0;
      transform: translate(50%, -50%);
    }

    .node-action-button.child {
      bottom: 0;
      left: calc(50% + 22px);
      transform: translate(-50%, 50%);
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto;
        transition: none;
      }
    }

    @media (max-width: 1120px) {
      main,
      main.left-collapsed,
      main.right-collapsed,
      main.left-collapsed.right-collapsed {
        grid-template-columns: 1fr;
      }

      .left-collapsed .left-side .side-body,
      .left-collapsed .left-side .side-header,
      .right-collapsed .right-side .side-body,
      .right-collapsed .right-side .side-header {
        display: flex;
      }

      .left-collapsed .left-side .side-rail,
      .right-collapsed .right-side .side-rail {
        display: none;
      }

      .side-header {
        display: flex;
      }

      .canvas-panel,
      #mindMap {
        min-height: 620px;
      }
    }

    @media (max-width: 640px) {
      .bar {
        align-items: flex-start;
        flex-direction: column;
      }

      main {
        padding: 10px;
      }

      .row > button,
      .row > .button-link {
        width: 100%;
      }

      .canvas-tools {
        top: 50px;
        right: auto;
        left: 10px;
      }

      #treeJsonInput,
      #nodeContentInput {
        min-height: 220px;
      }
    }
  </style>
  <script>
    window.externalPublicPath = "/static/vendor/simple-mind-map-0.14.0-fix.2/";
  </script>
  <script src="/static/vendor/simple-mind-map-0.14.0-fix.2/simpleMindMap.umd.min.js"></script>
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <h1>工作树</h1>
        <div class="meta">工作树视图</div>
      </div>
      <div class="row header-actions">
        <div class="menu-wrap">
          <button class="menu-button" id="menuBtn" type="button" aria-label="菜单" title="菜单" aria-haspopup="menu" aria-expanded="false">
            <span class="menu-icon" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </button>
          <div class="menu-list" id="pageMenu" hidden>
            <a href="/">控制台</a>
            <a href="/xhs">发布小红书</a>
          </div>
        </div>
      </div>
    </div>
  </header>
  <main id="workspace">
    <aside class="side left-side" aria-label="任务源">
      <button class="side-rail" id="leftRailBtn" type="button" aria-label="展开任务源">任务源</button>
      <div class="side-header">
        <div class="side-title">
          <h2>任务源</h2>
          <div class="meta" id="inputSummary">准备中</div>
        </div>
        <button class="collapse-button" id="leftCollapseBtn" type="button" title="收起任务源" aria-label="收起任务源">‹</button>
      </div>
      <div class="side-body">
        <div class="task-source-block">
          <div>
            <div class="field-label-row">
              <label for="treeSelect">选择文件</label>
              <div class="file-actions">
                <button class="icon-button" id="refreshSavedBtn" type="button" title="刷新文件列表" aria-label="刷新文件列表">
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M21 12a9 9 0 0 1-15.36 6.36M3 12A9 9 0 0 1 18.36 5.64" stroke-width="2" stroke-linecap="round"/>
                    <path d="M21 5v7h-7M3 19v-7h7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
                <button class="icon-button danger-icon-button" id="deleteFileBtn" type="button" title="删除选中文件" aria-label="删除选中文件" disabled>
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M3 6h18" stroke-width="2" stroke-linecap="round"/>
                    <path d="M8 6V4h8v2M6 6l1 15h10l1-15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M10 11v5M14 11v5" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                </button>
              </div>
            </div>
            <select id="treeSelect" name="task-tree-select"></select>
          </div>
        </div>
        <div class="source-divider" aria-hidden="true"></div>
        <div class="task-edit-block">
          <div>
            <label for="treeTitleInput">保存标题</label>
            <input id="treeTitleInput" name="task-tree-title" type="text" autocomplete="off" spellcheck="false" placeholder="例如：修身炉长期任务…">
          </div>
          <details class="input-panel" id="inputPanel">
            <summary>
              <span class="summary-copy">
                <span class="summary-title">JSON 导入 / 导出</span>
                <span class="summary-subtitle">渲染输入导入画布，同步当前树导出 JSON</span>
              </span>
              <span class="chevron" aria-hidden="true"></span>
            </summary>
            <div class="input-body">
              <div>
                <label for="treeJsonInput">工作树 JSON</label>
                <textarea id="treeJsonInput" name="task-tree-json" autocomplete="off" spellcheck="false" placeholder="粘贴 JSON…"></textarea>
              </div>
              <div class="row">
                <button id="renderBtn" type="button">渲染输入</button>
                <button class="secondary" id="syncJsonBtn" type="button">同步当前树</button>
              </div>
            </div>
          </details>
        </div>
        <div class="status" id="statusText" aria-live="polite">准备中</div>
        <div class="source-actions">
          <button id="saveBtn" type="button">保存到本地</button>
        </div>
      </div>
    </aside>

    <section class="canvas-panel" aria-label="工作树画布">
      <div class="canvas-label" id="canvasLabel">工作树</div>
      <div class="canvas-tools" aria-label="画布工具">
        <button class="mode-button" id="editModeBtn" type="button" aria-pressed="false" title="切换编辑模式" aria-label="切换编辑模式">编辑模式</button>
        <button class="tool-button" id="undoBtn" type="button" title="撤销" aria-label="撤销">↶</button>
        <button class="tool-button" id="redoBtn" type="button" title="重做" aria-label="重做">↷</button>
        <button class="tool-button" id="fitBtn" type="button" title="居中" aria-label="居中">中</button>
        <button class="tool-button" id="expandBtn" type="button" title="全部展开" aria-label="全部展开">展</button>
        <button class="tool-button" id="collapseBtn" type="button" title="全部收起" aria-label="全部收起">收</button>
      </div>
      <div id="mindMap"></div>
      <div class="node-preview" id="nodePreview" hidden></div>
    </section>

    <aside class="side right-side content-panel" aria-label="节点内容">
      <button class="side-rail" id="rightRailBtn" type="button" aria-label="展开节点内容">内容</button>
      <div class="side-header">
        <div class="side-title">
          <h2>节点属性</h2>
          <div class="meta" id="nodeKindText">未选择</div>
        </div>
        <button class="collapse-button" id="rightCollapseBtn" type="button" title="收起节点内容" aria-label="收起节点内容">›</button>
      </div>
      <div class="side-body">
        <div>
          <label for="selectedNodeTitle">节点标题</label>
          <input class="selected-node-title" id="selectedNodeTitle" type="text" autocomplete="off" spellcheck="false" disabled value="未选择节点。">
        </div>
        <div>
          <label for="nodeContentInput" id="nodeContentLabel">内容</label>
          <textarea id="nodeContentInput" spellcheck="false" disabled></textarea>
        </div>
        <div class="node-actions">
          <button class="danger-button" id="deleteNodeBtn" type="button" disabled>删除节点</button>
        </div>
        <div class="status" id="nodeContentStatus">选择节点后显示内容。</div>
      </div>
    </aside>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    const state = {
      busy: false,
      sample: "",
      selectedFilename: "",
      jsonDraftDirty: false,
      selectedUid: "",
      selectedIsRoot: false,
      selectedNode: null,
      editMode: false,
      mindMap: null,
    };

    function getMindMapCtor() {
      const exported = window.simpleMindMap;
      if (!exported) {
        throw new Error("SimpleMindMap 资源未加载。");
      }
      return exported.default || exported;
    }

    function setBusy(value) {
      state.busy = value;
      for (const control of document.querySelectorAll("button, input, select, textarea")) {
        control.disabled = value;
      }
      const hasSavedFiles = Array.from($("treeSelect").options).some((option) => option.value);
      $("treeSelect").disabled = value || !hasSavedFiles;
      updateSelectedControls();
    }

    function setStatus(text, kind = "") {
      const el = $("statusText");
      el.textContent = text || "";
      el.className = kind ? `status ${kind}` : "status";
    }

    function updateInputSummary(text = "") {
      const title = text || $("treeTitleInput").value.trim() || filenameStem(state.selectedFilename) || "未命名工作树";
      $("inputSummary").textContent = title;
      $("canvasLabel").textContent = title;
    }

    function setLeftCollapsed(collapsed) {
      $("workspace").classList.toggle("left-collapsed", collapsed);
      window.setTimeout(resizeMap, 180);
    }

    function setRightCollapsed(collapsed) {
      $("workspace").classList.toggle("right-collapsed", collapsed);
      window.setTimeout(resizeMap, 180);
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      const body = await response.json().catch(() => ({ detail: response.statusText }));
      if (!response.ok) {
        throw new Error(body.detail || response.statusText);
      }
      return body;
    }

    async function loadState(filename = "") {
      setBusy(true);
      try {
        const query = filename ? `?filename=${encodeURIComponent(filename)}` : "";
        const data = await requestJson(`/api/task-tree${query}`);
        renderState(data);
        setStatus(data.selected ? `已读取 ${data.selected.filename}` : "已载入示例。", "ok");
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        setBusy(false);
      }
    }

    function renderState(data) {
      state.sample = data.sample || "";
      const items = data.items || [];
      $("treeSelect").innerHTML = items.length
        ? items.map((item) => `<option value="${escapeHtml(item.filename)}">${escapeHtml(item.title)}</option>`).join("")
        : '<option value="">暂无</option>';
      $("treeSelect").disabled = items.length === 0;

      if (data.selected) {
        state.selectedFilename = data.selected.filename;
        state.jsonDraftDirty = false;
        $("treeTitleInput").value = data.selected.title;
        $("treeJsonInput").value = data.selected.text;
        $("treeSelect").value = data.selected.filename;
        updateInputSummary(data.selected.title);
        loadMindMap(data.selected.tree);
        return;
      }

      const sample = parseTreeText(state.sample);
      state.selectedFilename = "";
      state.jsonDraftDirty = false;
      $("treeTitleInput").value = sample.title || "";
      $("treeJsonInput").value = state.sample;
      updateInputSummary(sample.title || "");
      loadMindMap(sample);
    }

    function parseTreeText(text) {
      const stripped = String(text || "").trim();
      const match = stripped.match(/^```(?:json)?\s*([\s\S]*?)\s*```$/i);
      const source = match ? match[1].trim() : stripped;
      if (!source) {
        throw new Error("工作树 JSON 不能为空。");
      }
      return JSON.parse(source);
    }

    function renderFromInput() {
      try {
        const tree = parseTreeText($("treeJsonInput").value);
        if (!$("treeTitleInput").value.trim() && tree.title) {
          $("treeTitleInput").value = tree.title;
        }
        state.jsonDraftDirty = false;
        updateInputSummary(tree.title || "");
        loadMindMap(tree);
        setStatus("已从 JSON 导入到画布，尚未保存。", "ok");
      } catch (error) {
        setStatus(error.message, "error");
      }
    }

    function syncJsonFromMap() {
      if (!state.mindMap) {
        return;
      }
      const tree = getCurrentTaskTree();
      $("treeJsonInput").value = JSON.stringify(tree, null, 2);
      $("treeTitleInput").value = $("treeTitleInput").value.trim() || tree.title;
      state.jsonDraftDirty = false;
      updateInputSummary(tree.title);
      setStatus("当前画布树已导出到 JSON 输入。", "ok");
    }

    function loadMindMap(tree) {
      const MindMap = getMindMapCtor();
      const root = taskTreeToMindRoot(tree);
      hideNodePreview();
      clearNodeContentPanel();
      if (state.mindMap) {
        state.mindMap.destroy();
        state.mindMap = null;
      }
      state.mindMap = new MindMap({
        el: $("mindMap"),
        data: root,
        readonly: !state.editMode,
        layout: "organizationStructure",
        theme: "default",
        fit: true,
        fitPadding: 82,
        textAutoWrapWidth: 230,
        mousewheelAction: "zoom",
        minZoomRatio: 35,
        maxZoomRatio: 240,
        alwaysShowExpandBtn: true,
        isShowExpandNum: true,
        isShowCreateChildBtnIcon: false,
        expandBtnSize: 18,
        enableShortcutOnlyWhenMouseInSvg: true,
        enableAutoEnterTextEditWhenKeydown: true,
        enableDragModifyNodeWidth: true,
        defaultInsertSecondLevelNodeText: "新节点",
        defaultInsertBelowSecondLevelNodeText: "新节点",
        addCustomContentToNode: state.editMode ? createNodeActionContent() : null,
        errorHandler: (_code, error) => setStatus(error.message || String(error), "error"),
        themeConfig: {
          backgroundColor: "transparent",
          backgroundImage: "none",
          lineColor: "#8aa69c",
          lineWidth: 1.4,
          lineStyle: "straight",
          root: {
            shape: "rectangle",
            fillColor: "#edf7f0",
            color: "#14243a",
            borderColor: "#28745b",
            borderWidth: 1.7,
            borderRadius: 6,
            fontSize: 20,
            fontWeight: "bold",
            paddingX: 24,
            paddingY: 14,
            marginY: 80,
            marginX: 88,
          },
          second: {
            shape: "rectangle",
            fillColor: "#ffffff",
            color: "#17212f",
            borderColor: "#2f6fd6",
            borderWidth: 1.3,
            borderRadius: 6,
            fontSize: 16,
            paddingX: 18,
            paddingY: 12,
            marginY: 64,
            marginX: 60,
          },
          node: {
            shape: "rectangle",
            fillColor: "#fffaf2",
            color: "#253044",
            borderColor: "#d1a055",
            borderWidth: 1,
            borderRadius: 6,
            fontSize: 15,
            paddingX: 14,
            paddingY: 10,
            marginY: 42,
            marginX: 34,
          },
        },
      });
      state.mindMap.on("node_click", (node) => {
        selectNode(node && node.nodeData ? node : null);
      });
      state.mindMap.on("node_active", (node) => {
        selectNode(node && node.nodeData ? node : null);
      });
      state.mindMap.on("node_mouseenter", (node, event) => {
        showNodePreview(node, event);
      });
      state.mindMap.on("node_mouseleave", () => {
        hideNodePreview();
      });
      state.mindMap.on("data_change", () => {
        refreshCanvasSummary();
        refreshSelectedNodePanel();
      });
      applyMindMapMode();
      window.setTimeout(fitMap, 120);
    }

    function taskTreeToMindRoot(tree) {
      return {
        data: {
          uid: "root",
          text: normalizeMindMapText(tree.title, "未命名工作树"),
          expand: true,
          _xiushenlu: {
            root: true,
            version: Number(tree.version || 1),
            content: tree.summary || "",
          },
        },
        children: (Array.isArray(tree.nodes) ? tree.nodes : []).map((node, index) =>
          taskNodeToMindNode(node, `nodes-${index}`)
        ),
      };
    }

    function taskNodeToMindNode(node, fallbackId) {
      const children = Array.isArray(node.children) ? node.children : [];
      return {
        data: {
          uid: node.id || fallbackId,
          text: normalizeMindMapText(node.title, "未命名节点"),
          expand: true,
          _xiushenlu: {
            content: node.content || node.note || "",
          },
        },
        children: children.map((child, index) => taskNodeToMindNode(child, `${fallbackId}-${index}`)),
      };
    }

    function getCurrentTaskTree() {
      if (!state.mindMap) {
        return parseTreeText($("treeJsonInput").value);
      }
      const root = state.mindMap.getData(false);
      return mindRootToTaskTree(root);
    }

    function mindRootToTaskTree(root) {
      const data = root && root.data ? root.data : {};
      const meta = data._xiushenlu || {};
      const title = normalizeMindMapText(data.text, "未命名工作树");
      return {
        version: Number(meta.version || 1),
        title,
        summary: normalizeText(meta.content || "", ""),
        nodes: (Array.isArray(root.children) ? root.children : []).map((node, index) =>
          mindNodeToTaskNode(node, `nodes-${index}`)
        ),
      };
    }

    function mindNodeToTaskNode(node, fallbackId) {
      const data = node && node.data ? node.data : {};
      const meta = data._xiushenlu || {};
      const children = Array.isArray(node.children) ? node.children : [];
      const taskNode = {
        id: safeNodeId(data.uid || fallbackId, fallbackId),
        title: normalizeMindMapText(data.text, "未命名节点"),
      };
      const content = normalizeText(meta.content || "", "");
      if (content) {
        taskNode.content = content;
      }
      const childNodes = children.map((child, index) => mindNodeToTaskNode(child, `${fallbackId}-${index}`));
      if (childNodes.length) {
        taskNode.children = childNodes;
      }
      return taskNode;
    }

    function walkMindTree(node, visitor) {
      if (!node) {
        return;
      }
      visitor(node);
      for (const child of Array.isArray(node.children) ? node.children : []) {
        walkMindTree(child, visitor);
      }
    }

    function selectNode(node) {
      if (!node || !node.nodeData || !node.nodeData.data) {
        clearNodeContentPanel();
        return;
      }
      const nodeData = node.nodeData;
      const data = nodeData.data;
      const meta = data._xiushenlu || {};
      const uid = data.uid || "";
      state.selectedNode = node;
      state.selectedUid = uid;
      state.selectedIsRoot = Boolean(meta.root);
      const content = meta.content || "";
      $("selectedNodeTitle").value = normalizeMindMapText(data.text, "未命名节点");
      $("nodeKindText").textContent = state.selectedIsRoot ? "根节点摘要" : "任务节点内容";
      $("nodeContentLabel").textContent = state.selectedIsRoot ? "摘要" : "内容";
      $("nodeContentInput").value = content;
      $("nodeContentStatus").textContent = content ? "已载入内容。" : "暂无内容。";
      $("nodeContentStatus").className = "status";
      setRightCollapsed(false);
      updateSelectedControls();
    }

    function clearNodeContentPanel() {
      state.selectedNode = null;
      state.selectedUid = "";
      state.selectedIsRoot = false;
      $("selectedNodeTitle").value = "未选择节点。";
      $("nodeKindText").textContent = "未选择";
      $("nodeContentLabel").textContent = "内容";
      $("nodeContentInput").value = "";
      $("nodeContentStatus").textContent = "选择节点后显示内容。";
      $("nodeContentStatus").className = "status";
      updateSelectedControls();
    }

    function updateSelectedContent() {
      if (!state.selectedNode || !state.editMode) {
        return;
      }
      const data = state.selectedNode.nodeData.data;
      const meta = { ...(data._xiushenlu || {}), content: $("nodeContentInput").value };
      state.mindMap.execCommand("SET_NODE_DATA", state.selectedNode, { _xiushenlu: meta });
      $("nodeContentStatus").textContent = "内容已同步到当前树，保存后写入文件。";
      $("nodeContentStatus").className = "status ok";
    }

    function updateSelectedTitle() {
      if (!state.selectedNode || !state.editMode) {
        return;
      }
      const fallback = state.selectedIsRoot ? "未命名工作树" : "新节点";
      const text = normalizeMindMapText($("selectedNodeTitle").value, fallback);
      $("selectedNodeTitle").value = text;
      state.mindMap.execCommand("SET_NODE_TEXT", state.selectedNode, text);
      if (state.selectedIsRoot) {
        updateInputSummary(text);
      }
      $("nodeContentStatus").textContent = "标题已同步到当前树，保存后写入文件。";
      $("nodeContentStatus").className = "status ok";
    }

    function updateSelectedControls() {
      const hasNode = Boolean(state.selectedUid);
      const canReadNode = !state.busy && hasNode;
      const canEditNode = canReadNode && state.editMode;
      $("selectedNodeTitle").disabled = !canReadNode;
      $("selectedNodeTitle").readOnly = canReadNode && !canEditNode;
      $("nodeContentInput").disabled = !canReadNode;
      $("nodeContentInput").readOnly = canReadNode && !canEditNode;
      $("deleteNodeBtn").disabled = !canEditNode || state.selectedIsRoot;
      $("deleteFileBtn").disabled = state.busy || !state.selectedFilename;
      $("undoBtn").disabled = state.busy || !state.editMode;
      $("redoBtn").disabled = state.busy || !state.editMode;
    }

    function refreshSelectedNodePanel() {
      const node = state.selectedNode;
      if (!node || !node.nodeData || !node.nodeData.data) {
        return;
      }
      const data = node.nodeData.data;
      const meta = data._xiushenlu || {};
      if (document.activeElement !== $("selectedNodeTitle")) {
        $("selectedNodeTitle").value = normalizeMindMapText(data.text, state.selectedIsRoot ? "未命名工作树" : "未命名节点");
      }
      if (document.activeElement !== $("nodeContentInput")) {
        $("nodeContentInput").value = meta.content || "";
      }
    }

    function showNodePreview(node, event) {
      if (!node || !node.nodeData || !node.nodeData.data) {
        hideNodePreview();
        return;
      }
      const data = node.nodeData.data;
      const meta = data._xiushenlu || {};
      const content = normalizeText(meta.content || "", "暂无内容。");
      $("nodePreview").innerHTML = `<div class="node-preview-content">${escapeHtml(content)}</div>`;
      $("nodePreview").hidden = false;
      positionNodePreview(event);
    }

    function hideNodePreview() {
      $("nodePreview").hidden = true;
    }

    function positionNodePreview(event) {
      const preview = $("nodePreview");
      if (preview.hidden) {
        return;
      }
      const point = eventClientPoint(event);
      const gap = 14;
      const margin = 12;
      let left = point.x + gap;
      let top = point.y + gap;
      const rect = preview.getBoundingClientRect();
      if (left + rect.width + margin > window.innerWidth) {
        left = Math.max(margin, point.x - rect.width - gap);
      }
      if (top + rect.height + margin > window.innerHeight) {
        top = Math.max(margin, point.y - rect.height - gap);
      }
      preview.style.left = `${left}px`;
      preview.style.top = `${top}px`;
    }

    function eventClientPoint(event) {
      const source = event && (event.event || event.originalEvent || event);
      const x = Number(source && source.clientX);
      const y = Number(source && source.clientY);
      if (Number.isFinite(x) && Number.isFinite(y)) {
        return { x, y };
      }
      return { x: Math.round(window.innerWidth / 2), y: 90 };
    }

    function refreshCanvasSummary() {
      if (!state.mindMap) {
        return;
      }
      const root = state.mindMap.getData(false);
      const rootData = root && root.data ? root.data : {};
      updateInputSummary(normalizeMindMapText(rootData.text, ""));
    }

    function normalizeText(value, fallback) {
      const text = String(value || "").trim();
      return text || fallback;
    }

    function normalizeMindMapText(value, fallback) {
      const text = htmlishTextToPlain(value);
      return text || fallback;
    }

    function htmlishTextToPlain(value) {
      let text = String(value || "").trim();
      for (let i = 0; i < 3; i += 1) {
        const textarea = document.createElement("textarea");
        textarea.innerHTML = text;
        const decoded = textarea.value;
        if (decoded === text) {
          break;
        }
        text = decoded.trim();
      }
      if (!/[<&]/.test(text)) {
        return text;
      }
      const template = document.createElement("template");
      template.innerHTML = text;
      return (template.content.textContent || text).trim();
    }

    function safeNodeId(value, fallback) {
      const text = String(value || fallback || "").trim();
      const normalized = text.replace(/[^\w-]+/g, "-").replace(/^-+|-+$/g, "");
      return normalized || fallback || "node";
    }

    function setEditMode(value) {
      state.editMode = Boolean(value);
      $("workspace").classList.toggle("edit-mode", state.editMode);
      $("editModeBtn").setAttribute("aria-pressed", state.editMode ? "true" : "false");
      $("editModeBtn").textContent = state.editMode ? "编辑中" : "编辑模式";
      applyMindMapMode();
      updateSelectedControls();
      setStatus(state.editMode ? "编辑模式已开启。节点右侧加同级，下侧加子节点。" : "编辑模式已关闭。", "ok");
    }

    function applyMindMapMode() {
      if (!state.mindMap) {
        return;
      }
      if (typeof state.mindMap.setMode === "function") {
        state.mindMap.setMode(state.editMode ? "edit" : "readonly");
      } else {
        state.mindMap.updateConfig({ readonly: !state.editMode });
      }
      state.mindMap.updateConfig({
        addCustomContentToNode: state.editMode ? createNodeActionContent() : null,
      });
      state.mindMap.reRender();
    }

    function createNodeActionContent() {
      return {
        create: (node) => {
          const layer = document.createElement("div");
          layer.className = "node-action-layer";
          layer.style.width = "1px";
          layer.style.height = "1px";

          if (!node.isRoot) {
            layer.appendChild(createNodeActionButton("sibling", "新增同级", () => insertSiblingNode(node)));
          }
          layer.appendChild(createNodeActionButton("child", "新增子节点", () => insertChildNode(node)));
          return { el: layer, width: 1, height: 1 };
        },
        handle: ({ content, element, node }) => {
          const width = Math.max(1, Number(node.width || 1));
          const height = Math.max(1, Number(node.height || 1));
          content.el.style.width = `${width}px`;
          content.el.style.height = `${height}px`;
          content.width = width;
          content.height = height;
          if (typeof element.size === "function") {
            element.size(width, height);
          } else {
            element.width(width);
            element.height(height);
          }
          element.x(0).y(0);
        },
      };
    }

    function createNodeActionButton(kind, title, handler) {
      const button = document.createElement("button");
      button.className = `node-action-button ${kind}`;
      button.type = "button";
      button.title = title;
      button.setAttribute("aria-label", title);
      button.textContent = "+";
      button.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        handler();
      });
      button.addEventListener("dblclick", (event) => {
        event.preventDefault();
        event.stopPropagation();
      });
      return button;
    }

    function newNodeData() {
      return {
        text: "新节点",
        _xiushenlu: {
          content: "",
        },
      };
    }

    function insertChildNode(node) {
      if (!state.mindMap || !state.editMode || !node) {
        return;
      }
      state.mindMap.execCommand("INSERT_CHILD_NODE", false, [node], newNodeData());
      setStatus("已新增子节点，保存后写入文件。", "ok");
    }

    function insertSiblingNode(node) {
      if (!state.mindMap || !state.editMode || !node || node.isRoot) {
        return;
      }
      state.mindMap.execCommand("INSERT_NODE", false, [node], newNodeData());
      setStatus("已新增同级节点，保存后写入文件。", "ok");
    }

    function deleteSelectedNode() {
      if (!state.mindMap || !state.editMode || !state.selectedNode || state.selectedIsRoot) {
        return;
      }
      const title = normalizeMindMapText(state.selectedNode.nodeData.data.text, "当前节点");
      state.mindMap.execCommand("REMOVE_NODE", [state.selectedNode]);
      clearNodeContentPanel();
      setStatus(`已删除“${title}”及其子节点，可用撤销恢复。`, "ok");
    }

    function runHistoryCommand(command) {
      if (!state.mindMap) {
        return;
      }
      state.mindMap.execCommand(command);
      refreshCanvasSummary();
      refreshSelectedNodePanel();
    }

    async function saveTree() {
      if (!state.mindMap) {
        return;
      }
      if (state.jsonDraftDirty) {
        setStatus("JSON 输入有未应用更改。请先点“渲染输入”导入画布，或点“同步当前树”放弃这段 JSON 草稿。", "error");
        return;
      }
      setBusy(true);
      setStatus("保存中…");
      try {
        const tree = getCurrentTaskTree();
        const data = await requestJson("/api/task-tree", {
          method: "POST",
          body: JSON.stringify({
            title: $("treeTitleInput").value || tree.title,
            text: JSON.stringify(tree, null, 2),
          }),
        });
        renderState(data.state);
        setStatus(data.message || "工作树已保存。", "ok");
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        setBusy(false);
      }
    }

    function resizeMap() {
      if (state.mindMap) {
        state.mindMap.resize();
      }
    }

    function fitMap() {
      if (state.mindMap && state.mindMap.view && state.mindMap.view.fit) {
        state.mindMap.view.fit();
      }
    }

    function expandAll() {
      if (state.mindMap) {
        state.mindMap.execCommand("EXPAND_ALL");
        fitMap();
      }
    }

    function collapseAll() {
      if (state.mindMap) {
        state.mindMap.execCommand("UNEXPAND_ALL");
        fitMap();
      }
    }

    function refreshSavedFiles() {
      return loadState($("treeSelect").value || state.selectedFilename);
    }

    async function deleteSelectedFile() {
      const filename = $("treeSelect").value || state.selectedFilename;
      if (!filename || state.busy) {
        return;
      }
      const confirmed = window.confirm(
        `确定删除工作树文件「${filenameStem(filename)}」吗？\n\n这会直接删除 ${filename}，不能从页面内恢复。`
      );
      if (!confirmed) {
        return;
      }
      setBusy(true);
      try {
        hideNodePreview();
        const data = await requestJson("/api/task-tree/delete", {
          method: "POST",
          body: JSON.stringify({ filename }),
        });
        renderState(data.state);
        setStatus(data.message, "ok");
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        setBusy(false);
      }
    }

    function filenameStem(filename) {
      return String(filename || "").replace(/\.json$/i, "");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    $("leftCollapseBtn").addEventListener("click", () => setLeftCollapsed(true));
    $("leftRailBtn").addEventListener("click", () => setLeftCollapsed(false));
    $("rightCollapseBtn").addEventListener("click", () => setRightCollapsed(true));
    $("rightRailBtn").addEventListener("click", () => setRightCollapsed(false));
    $("treeSelect").addEventListener("change", () => loadState($("treeSelect").value));
    $("treeTitleInput").addEventListener("input", () => updateInputSummary());
    $("treeJsonInput").addEventListener("input", () => {
      state.jsonDraftDirty = true;
      setStatus("JSON 输入已变更，但尚未导入画布；保存前需要渲染输入或同步当前树。");
    });
    $("refreshSavedBtn").addEventListener("click", refreshSavedFiles);
    $("renderBtn").addEventListener("click", renderFromInput);
    $("syncJsonBtn").addEventListener("click", syncJsonFromMap);
    $("saveBtn").addEventListener("click", saveTree);
    $("deleteFileBtn").addEventListener("click", deleteSelectedFile);
    $("editModeBtn").addEventListener("click", () => setEditMode(!state.editMode));
    $("undoBtn").addEventListener("click", () => runHistoryCommand("BACK"));
    $("redoBtn").addEventListener("click", () => runHistoryCommand("FORWARD"));
    $("fitBtn").addEventListener("click", fitMap);
    $("expandBtn").addEventListener("click", expandAll);
    $("collapseBtn").addEventListener("click", collapseAll);
    $("selectedNodeTitle").addEventListener("input", updateSelectedTitle);
    $("nodeContentInput").addEventListener("input", updateSelectedContent);
    $("deleteNodeBtn").addEventListener("click", deleteSelectedNode);
    $("mindMap").addEventListener("mousemove", positionNodePreview);
    $("menuBtn").addEventListener("click", (event) => {
      event.stopPropagation();
      const menu = $("pageMenu");
      const hidden = menu.hidden;
      menu.hidden = !hidden;
      $("menuBtn").setAttribute("aria-expanded", String(hidden));
    });
    document.addEventListener("click", (event) => {
      const menu = $("pageMenu");
      const button = $("menuBtn");
      if (!menu.hidden && !menu.contains(event.target) && event.target !== button) {
        menu.hidden = true;
        button.setAttribute("aria-expanded", "false");
      }
    });
    window.addEventListener("resize", () => {
      hideNodePreview();
      resizeMap();
    });
    loadState();
  </script>
</body>
</html>
